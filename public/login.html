<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CombANTICS — Sign in</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/lobby.css" />
</head>
<body>

  <div id="lobby-container">
    <div id="lobby-panel">
      <a class="site-title">
        <span class="title-main">CombA</span>
        <span class="title-accent">N</span>
        <span class="title-main">T</span>
        <span class="title-accent">ICS</span>
      </a>

      <div class="cols" style="grid-template-columns:1fr 1fr; gap:18px;">
        <div>
          <h3 style="margin-top:0;">Sign in</h3>
          <label for="signinUsername">Username</label>
          <input id="signinUsername" type="text" autocomplete="username" />

          <label for="signinPassword" style="margin-top:8px">Password</label>
          <input id="signinPassword" type="password" autocomplete="current-password" />

          <div class="row">
            <button id="btnSignin" class="btn">Sign in</button>
            <button id="btnSigninClear" class="btn secondary" type="button">Clear</button>
          </div>

          <div id="signinStatus" class="status"></div>
        </div>

        <div>
          <h3 style="margin-top:0;">Create account</h3>
          <label for="signupUsername">Username</label>
          <input id="signupUsername" type="text" autocomplete="username" />

          <label for="signupPassword" style="margin-top:8px">Password</label>
          <input id="signupPassword" type="password" autocomplete="new-password" />

          <label for="signupDisplay" style="margin-top:8px">Display name</label>
          <input id="signupDisplay" type="text" maxlength="25" />

          <div class="row">
            <button id="btnSignup" class="btn">Sign up</button>
            <button id="btnSignupClear" class="btn secondary" type="button">Clear</button>
          </div>

          <div id="signupStatus" class="status"></div>
        </div>

        <div class="full" style="margin-top:12px;">
          <div class="row" style="justify-content:space-between; align-items:center;">
            <div class="muted">Session token: <span id="tokenPreview">none</span></div>
            <div>
              <button id="btnClearToken" class="btn secondary" type="button">Clear token</button>
            </div>
          </div>

          <div id="log" aria-live="polite"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="login.js" type="module"></script>
</body>
</html>
