<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CombANTICS</title>
  <link rel="stylesheet" href="css/lobby.css" />
  <link href="assets/img/favicon.ico" rel="icon">
  <style>
    /* small debug/status styles added inline for convenience */
    #lobbyStatus { margin-top: 10px; padding: 8px; border-radius: 6px; background:#f3f4f6; color:#111; font-size:14px; }
    #lobbyStatus.good { background:#e6ffed; color:#04660d; }
    #lobbyStatus.bad { background:#ffe6e6; color:#8b0000; }
    #lobbyLog { margin-top:10px; height:160px; overflow:auto; background:#0f1724; color:#cbd5e1; padding:8px; font-family:monospace; font-size:13px; border-radius:6px; }
    .game-entry { cursor:pointer; padding:6px; border-bottom:1px solid #eee; }
    .game-entry:hover { background:#f8fafc; }
  </style>
</head>
<body>

  <div id="lobby-container">
    <div id="lobby-panel">
      <a class="site-title">
        <span class="title-main">CombA</span>
        <span class="title-accent">N</span>
        <span class="title-main">T</span>
        <span class="title-accent">ICS</span>
      </a>
      <a href='keybinds.html'>Keybinds</a>
      <div class="input-group">     
        <input id="nameInput" type="text" placeholder="Name" maxlength="25" />
        <button id="joinBtn">Start New Game</button>
      </div>

      <div id="games-panel">
        <h2>Active Games</h2>
        <ul id="gameList"></ul>
      </div>

      <div id="lobbyStatus" class="muted">Status: idle</div>
      <div id="lobbyLog" aria-live="polite"></div>
    </div>
  </div>

  <script type="module" src="./lobby.js"></script>
</body>
</html>
