  <script>
    window.addEventListener('error', function onScriptError(e){
      // Only act on script loading errors
      if (e.target && e.target.tagName === 'SCRIPT') {
        if (typeof Phaser === 'undefined') {
          document.write('https://unpkg.com/phaser@4.0.0/dist/phaser.js');
        }
      }
      window.removeEventListener('error', onScriptError, true);
    }, true);
  </script>
